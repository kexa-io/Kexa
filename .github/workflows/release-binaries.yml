name: Build and Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lock

      - name: Install dependencies
        run: bun install

      - name: Update headers.service.ts with latest data
        run: |
          echo "Running Kexa to generate latest headers data..."
          timeout 60 bun run Kexa/main.ts || true
          echo "Headers service file updated with latest provider data"

      - name: Upload source for build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: source-with-headers
          path: |
            Kexa/
            node_modules/
            package.json
            bun.lock
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            output: kexa-linux-x64
          - target: bun-linux-arm64
            output: kexa-linux-arm64
          - target: bun-darwin-x64
            output: kexa-macos-x64
          - target: bun-darwin-arm64
            output: kexa-macos-arm64
          - target: bun-windows-x64
            output: kexa-windows-x64.exe
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Download source
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: source-with-headers

      - name: Build ${{ matrix.target }}
        run: |
          mkdir -p dist
          bun build ./Kexa/main.ts --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.output }} --minify

      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: dist
          pattern: kexa-*
          merge-multiple: true

      - name: Upload binaries to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
