name: Generate SBOM

on:
  pull_request:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  generate-sbom:
    permissions:
      actions: write  # anchore/sbom-action
      contents: write  # anchore/sbom-action
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lock

      - name: Install dependencies
        run: bun i
  
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          file: ./bun.lock
          upload-artifact: true
          upload-artifact-retention: 8
          output-file: ./kexa-sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: kexa-sbom.json
          path: kexa-sbom.json
          
  commit-sbom:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: generate-sbom
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
  
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kexa-sbom.json

      - name: Commit SBOM to repository
        run: |
          git fetch origin
          git checkout dev
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add kexa-sbom.json
          git commit -m "Add SBOM artifact to dev branch [skip ci]"
          git push origin dev
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}